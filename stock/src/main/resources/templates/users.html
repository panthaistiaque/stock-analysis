<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragments/head :: commonHead('Users | Stock')}"></head>

<body>
    <div class="app-shell">
        <div th:replace="~{fragments/header :: appHeader(${appTitle}, ${username}, ${headerMenus}, ${user})}"></div>
        <div class="layout">
            <div th:replace="~{fragments/sidebar :: sidebar(${sidebarMenus})}"></div>
            <main class="content">
                <div class="top-bar">
                    <div class="top-bar-left">
                        <div class="page-title-custom">
                            User List
                        </div>
                    </div>
                    <div class="top-bar-right">
                        <div class="dropdown-wrapper">
                            <button type="button" class="button button-secondary" onclick="toggleDropdown('filterMenu')">
                                <i class="fa-solid fa-filter"></i>
                                Filter
                            </button>
                            <div id="filterMenu" class="dropdown-menu-custom">
                                <div class="dropdown-title">Filter Users</div>
                                <form method="get" th:action="@{/admin/users}">
                                    <div class="dropdown-group">
                                        <input class="form-control" type="text" name="search" th:value="${search}" placeholder="Username or Email">
                                    </div>
                                    <div class="dropdown-group">
                                        <select class="form-control" name="roleFilter">
                                            <option value="">All Roles</option>
                                            <option value="ADMIN" th:selected="${roleFilter == 'ADMIN'}">Admin</option>
                                            <option value="USER" th:selected="${roleFilter == 'USER'}">User</option>
                                        </select>
                                    </div>
                                    <div class="dropdown-actions">
                                        <button class="button button-secondary" type="submit">Apply Filter</button>
                                        <a th:href="@{/admin/users}" class="button">Clear</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <section class="panel">
                    <div class="panel-header records-header">
                        <div class="records-title">User Records</div>
                        <div class="active-filters">
                            <span th:if="${search != null and !#strings.isEmpty(search)}" class="filter-badge">
                                Search: <strong th:text="${search}"></strong>
                            </span>
                            <span th:if="${roleFilter != null and !#strings.isEmpty(roleFilter)}" class="filter-badge">
                                Role: <strong th:text="${roleFilter}"></strong>
                            </span>
                        </div>
                    </div>
                    <div class="panel-body table-wrap">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Full Name</th>
                                    <th>Email</th>
                                    <th>Username</th>
                                    <th>Status</th>
                                    <th>Approval</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user, stat : ${users}">
                                    <td th:text="${stat.count + (userPage.number * userPage.size)}"></td>
                                    <td th:text="${user.fullName}">Full Name</td>
                                    <td th:text="${user.email}">email</td>
                                    <td th:text="${user.username}">admin</td>
                                    <td>
                                        <span class="badge" th:text="${user.role}"
                                            th:classappend="${user.role == 'ADMIN'} ? ' badge-danger' : ' badge-primary'">
                                        </span>
                                    </td>
                                    <td>
                                        <span class="badge badge-success" th:if="${user.approved}">Approved</span>
                                        <span class="badge badge-warning" th:unless="${user.approved}">Pending</span>
                                    </td>
                                    <td>
                                        <form th:if="${!user.approved}"
                                            th:action="@{/admin/users/{id}/approve(id=${user.id})}" method="post">
                                            <button class="button button-success button-small"
                                                type="submit"><i class="fa-solid fa-circle-check"></i>   Approve</button>
                                        </form>
                                        <button th:if="${user.approved}" class="button button-success button-small" type="submit" th:disabled="${user.approved}"><i class="fa-solid fa-circle-check"></i>   Approve</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:replace="~{fragments/pagination :: pagination(${userPage}, '/admin/users')}"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <div th:replace="~{fragments/script-addon :: script-addon()}"></div>
</body>

</html>
