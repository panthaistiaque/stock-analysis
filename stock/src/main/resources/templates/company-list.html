<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('Saved Companies | Stock')}"></head>
<head th:replace="~{fragments/head :: commonHead('Saved Companies | ' + ${appTitle})}"></head>

<body>
    <div class="app-shell">
        <div th:replace="~{fragments/header :: appHeader(${appTitle}, ${username}, ${headerMenus}, ${user})}"></div>
        <div class="layout">
            <div th:replace="~{fragments/sidebar :: sidebar(${sidebarMenus})}"></div>
            <main class="content">
                <div class="top-bar">
                    <div class="top-bar-left">
                        <div class="page-title-custom">
                            Listed Companies
                        </div>
                    </div>
                    <div class="top-bar-right">

                        <form th:action="@{/trading-code/scrape-save-all}" method="post" style="display: inline;"
                            onsubmit="return confirm('Initiate full market scraping? This may take several minutes.');">
                            <button type="submit" class="button button-success">
                                <i class="fa-solid fa-cloud-arrow-down me-1"></i>
                                Global Sync
                            </button>
                        </form>

                        <a th:href="@{/company/view}" class="button">
                            <i class="fa-solid fa-plus me-1"></i>
                            Scrape Company
                        </a>

                        <div class="dropdown-wrapper">
                            <button type="button" class="button button-secondary" onclick="toggleDropdown('filterMenu')">
                                <i class="fa-solid fa-filter"></i>
                                Filter
                            </button>

                            <div id="filterMenu" class="dropdown-menu-custom">
                                <div class="dropdown-title">
                                    Filter Companies
                                </div>
                                <form th:action="@{/company/list}" method="get">
                                    <div class="dropdown-group">
                                        <input class="form-control" name="code" th:value="${code}" placeholder="Trading code">
                                    </div>
                                    <div class="dropdown-group">
                                        <input class="form-control" name="sector" th:value="${sector}" placeholder="Sector">
                                    </div>
                                    <div class="dropdown-group">
                                        <input class="form-control" name="marketCategory" th:value="${marketCategory}"
                                            placeholder="Category">
                                    </div>
                                    <div class="dropdown-group">
                                        <div class="inline-form">
                                            <input class="form-control" type="number" step="any" name="minPeRatio"
                                                th:value="${minPeRatio}" placeholder="Min PE">
                                            <input class="form-control" type="number" step="any" name="maxPeRatio"
                                                th:value="${maxPeRatio}" placeholder="Max PE">
                                        </div>
                                    </div>
                                    <div class="dropdown-actions">
                                        <button class="button button-secondary" type="submit">Apply Filter</button>
                                        <a class="button" th:href="@{/company/list}">Clear</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <section class="panel">
                    <div class="panel-header records-header">
                        <div class="records-title">
                            Company Records
                        </div>
                        <div class="active-filters">
                            <span th:if="${code != null and !#strings.isEmpty(code)}" class="filter-badge">
                                Code: <strong th:text="${code}"></strong>
                            </span>
                            <span th:if="${sector != null and !#strings.isEmpty(sector)}" class="filter-badge">
                                Sector: <strong th:text="${sector}"></strong>
                            </span>
                            <span th:if="${marketCategory != null and !#strings.isEmpty(marketCategory)}" class="filter-badge">
                                Category: <strong th:text="${marketCategory}"></strong>
                            </span>
                            <span th:if="${minPeRatio != null or maxPeRatio != null}" class="filter-badge">
                                PE: <strong th:text="${(minPeRatio ?: '0') + ' - ' + (maxPeRatio ?: 'Any')}"></strong>
                            </span>
                        </div>
                    </div>
                    <div class="panel-body table-wrap">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Code</th>
                                    <th>Market Category</th>
                                    <th>Sector</th>
                                    <th style="text-align:right;">PE Ratio</th>
                                    <th style="text-align:right;">Last Year EPS</th>
                                    <th style="text-align:right;">Last Year Dividend</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="company, stat : ${companies}">
                                    <td th:text="${stat.count + (companyPage.number * companyPage.size)}"></td>
                                    <td class="fw-bold" th:text="${company.code}"></td>
                                    <td th:text="${company.marketCategory ?: '-'}"></td>
                                    <td th:text="${company.sector ?: '-'}"></td>
                                    <td style="text-align:right;" th:text="${company.peRatio ?: '-'}"></td>
                                    <td style="text-align:right;" th:text="${company.lastEpsDisplay}"></td>
                                    <td style="text-align:right;" th:text="${company.lastDividendDisplay}"></td>
                                    <td>
                                        <div class="button-group">
                                            <a class="button button-small"
                                                th:href="@{/company/{code}/report(code=${company.code})}">
                                                <i class="fa-solid fa-eye"></i> View
                                            </a>
                                            <a class="button button-small button-success"
                                                th:href="@{/fundamental-analysis/{code}(code=${company.code})}">
                                                <i class="fa-solid fa-chart-line"></i> Analysis
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(companies)}">
                                    <td colspan="8" style="text-align: center; padding: 2rem;">No company records found.</td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:replace="~{fragments/pagination :: pagination(${companyPage}, '/company/list')}"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <div th:replace="~{fragments/script-addon :: script-addon()}"></div>
</body>

</html>
