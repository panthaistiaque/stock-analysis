<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragments/head :: commonHead('Edit Stock | Stock')}"></head>

<body>
<div class="app-shell">
    <div th:replace="~{fragments/header :: appHeader(${appTitle}, ${username}, ${headerMenus}, ${user})}"></div>
    <div class="layout">
        <div th:replace="~{fragments/sidebar :: sidebar(${sidebarMenus})}"></div>
        <main class="content">
            <h1 class="page-title">Edit Stock Data</h1>
            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

            <section class="panel">
                <div class="panel-body">
                    <form th:action="@{/stocks/{id}/edit(id=${stockDataForm.id})}" th:object="${stockDataForm}" method="post">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="date">DATE</label>
                                <input class="form-control" id="date" th:field="*{date}" type="date" required>
                            </div>
                            <div class="form-group">
                                <label for="tradingCode">TRADING CODE</label>
                                <input class="form-control" id="tradingCode" th:field="*{tradingCode}" required>
                            </div>
                            <div class="form-group">
                                <label for="ltp">LTP</label>
                                <input class="form-control" id="ltp" th:field="*{ltp}" type="number" step="0.0001">
                            </div>
                            <div class="form-group">
                                <label for="high">HIGH</label>
                                <input class="form-control" id="high" th:field="*{high}" type="number" step="0.0001">
                            </div>
                            <div class="form-group">
                                <label for="low">LOW</label>
                                <input class="form-control" id="low" th:field="*{low}" type="number" step="0.0001">
                            </div>
                            <div class="form-group">
                                <label for="openp">OPENP</label>
                                <input class="form-control" id="openp" th:field="*{openp}" type="number" step="0.0001">
                            </div>
                            <div class="form-group">
                                <label for="closep">CLOSEP</label>
                                <input class="form-control" id="closep" th:field="*{closep}" type="number" step="0.0001">
                            </div>
                            <div class="form-group">
                                <label for="ycp">YCP</label>
                                <input class="form-control" id="ycp" th:field="*{ycp}" type="number" step="0.0001">
                            </div>
                            <div class="form-group">
                                <label for="tradeValue">TRADE VALUE</label>
                                <input class="form-control" id="tradeValue" th:field="*{tradeValue}" type="number" step="0.0001">
                            </div>
                            <div class="form-group">
                                <label for="volume">VOLUME</label>
                                <input class="form-control" id="volume" th:field="*{volume}" type="number" step="1">
                            </div>
                        </div>
                        <button class="button" type="submit">Save Changes</button>
                        <a class="button button-secondary" th:href="@{/stocks/data}">Cancel</a>
                    </form>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
