<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('Change Password | Stock')}"></head>

<body>
    <div class="app-shell">
        <div th:replace="~{fragments/header :: appHeader(${appTitle}, ${username}, ${headerMenus}, ${user})}"></div>
        <div class="layout">
            <div th:replace="~{fragments/sidebar :: sidebar(${sidebarMenus})}"></div>
            <main class="content">
                <h1 class="page-title">Change Password</h1>

                <section class="panel form-panel">
                    <div class="panel-header">Password Information</div>
                    <div class="panel-body">
                        <div class="alert alert-success" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></div>
                        <div class="alert alert-error" th:if="${passwordError}" th:text="${passwordError}"></div>
                        <form th:action="@{/user/password}" th:object="${passwordChangeForm}" method="post">
                            <div class="form-group">
                                <label for="oldPassword">Old Password</label>
                                <input class="form-control" id="oldPassword" th:field="*{oldPassword}" type="password"
                                    autocomplete="current-password" required>
                            </div>
                            <div class="form-group">
                                <label for="newPassword">New Password</label>
                                <input class="form-control" id="newPassword" th:field="*{newPassword}" type="password"
                                    autocomplete="new-password" required>
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <input class="form-control" id="confirmPassword" th:field="*{confirmPassword}"
                                    type="password" autocomplete="new-password" required>
                            </div>
                            <button class="button" type="submit">Change Password</button>
                        </form>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>

</html>
