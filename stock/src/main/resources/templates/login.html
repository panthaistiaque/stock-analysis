<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragments/head :: commonHead('Login | Stock')}"></head>

<body class="auth-page">
<main class="auth-box">
    <div class="brand" th:text="${appTitle}">Stock Admin</div>
    <section class="panel">
        <div class="panel-header">Sign in</div>
        <div class="panel-body">
            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
            <div class="alert alert-success" th:if="${param.passwordChanged}">Password changed. Please sign in again.</div>
            <div class="alert alert-success" th:if="${param.logout}">You have been logged out.</div>
            <div class="alert alert-error" th:if="${param.error}">Invalid username/password or account not approved.</div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input class="form-control" id="username" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                    <button class="button" type="submit" style="margin-bottom: 0;">Login</button>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="remember-me" name="remember-me" style="width: auto; margin-bottom: 0;">
                        <label for="remember-me" style="margin-bottom: 0; cursor: pointer; white-space: nowrap;">Remember me</label>
                    </div>
                </div>
            </form>
            <p>Need an account? <a th:href="@{/register}">Register</a></p>
        </div>
    </section>
</main>
</body>
</html>
