<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('Market Information | Stock')}"></head>

<head th:replace="~{fragments/head :: commonHead('Market Information | ' + ${appTitle})}"></head>
<style>
    /* .dropdown-header {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 15px;
    }

    .dropdown-footer {
        margin-top: 10px;
        font-size: 13px;
        color: #dc3545;
    } */
</style>
<style>
    .records-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
    }

    .records-title {
        font-size: 16px;
        font-weight: 700;
        color: #0f172a;
    }

    .active-filters {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-left: auto;
    }

    .filter-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 12px;
        background: #eef3ff;
        color: #3451b2;
        border: 1px solid #d8e2ff;
        border-radius: 999px;
        font-size: 13px;
        line-height: 1.2;
        white-space: nowrap;
    }

    .filter-badge strong {
        font-weight: 600;
    }
</style>


<body>
    <div class="app-shell">
        <div th:replace="~{fragments/header :: appHeader(${appTitle}, ${username}, ${headerMenus}, ${user})}"></div>
        <div class="layout">
            <div th:replace="~{fragments/sidebar :: sidebar(${sidebarMenus})}"></div>
            <main class="content">
                <div class="top-bar">
                    <div class="top-bar-left">
                        <div class="page-title-custom">
                            Market Information
                        </div>
                    </div>
                    <div class="top-bar-right">

                        <form th:action="@{/stocks/sync-today}" method="post" style="display: inline;">
                            <button type="submit" class="button button-success">
                                <i class="fa-solid fa-cloud-arrow-down me-1"></i>
                                Global Sync
                            </button>
                        </form>

                        <a th:href="@{/stocks/upload}" class="button">
                            <i class="fa-solid fa-file-import me-1"></i>
                            Upload Excel
                        </a>

                        <!-- Bulk Action Here -->
                        <div class="dropdown-wrapper" >

                            <button type="button" class="button button-danger" onclick="toggleDropdown('bulkMenu')">

                                <i class="fa-solid fa-trash"></i>
                                Delete
                            </button>

                            <div id="bulkMenu" class="dropdown-menu-custom">

                                <div class="dropdown-title">
                                    Delete Records by Trading Code
                                </div>

                                <form th:action="@{/stocks/delete-by-code}" method="post">

                                    <div class="dropdown-group">

                                        <input type="text" class="form-control" name="tradingCode" autocomplete="off"
                                            placeholder="Trading Code" list="tradingCodeList">
                                        <datalist id="tradingCodeList">
                                            <option th:each="code : ${tradingCodes}" th:value="${code}"></option>
                                        </datalist>

                                    </div>

                                    <button type="submit" class="button button-danger" style="width:100%;">

                                        Delete All Records

                                    </button>

                                </form>

                                <div class="dropdown-note">
                                    <i class="fa-solid fa-triangle-exclamation"></i>
                                    This action cannot be undone.
                                </div>

                            </div>

                        </div>
                        <!-- Filter Button -->
                        <div class="dropdown-wrapper" >

                            <button type="button" class="button button-secondary"
                                onclick="toggleDropdown('filterMenu')">

                                <i class="fa-solid fa-filter"></i>
                                Filter

                            </button>

                            <div id="filterMenu" class="dropdown-menu-custom">

                                <div class="dropdown-title">
                                    Filter Market Data
                                </div>

                                <form method="get" th:action="@{/stocks/data}">

                                    <div class="dropdown-group">
                                        <input class="form-control" type="text" name="tradingCode"
                                            th:value="${tradingCode}" placeholder="Trading Code" list="tradingCodeList">
                                    </div>
                                    <div class="dropdown-group">
                                        <input class="form-control date-picker flatpickr-input" type="date"
                                            name="fromDate" th:value="${fromDate}" placeholder="YYYY-MM-DD">
                                    </div>
                                    <div class="dropdown-group">
                                        <input class="form-control date-picker flatpickr-input" type="date"
                                            name="toDate" th:value="${toDate}" placeholder="YYYY-MM-DD">
                                    </div>

                                    <div class="dropdown-actions">
                                        <button class="button button-secondary" type="submit"> Apply Filter </button>
                                        <a th:href="@{/stocks/data}" class="button"> Clear </a>
                                    </div>

                                </form>

                            </div>

                        </div>
                    </div>

                </div>


                <!-- Records Panel -->
                <section class="panel">
                    <!-- <div class="panel-header">Market Data Records</div> -->
                    <div class="panel-header records-header">

                        <div class="records-title">
                            Market Information
                        </div>

                        <div class="active-filters">

                            <span th:if="${tradingCode != null and !#strings.isEmpty(tradingCode)}"
                                class="filter-badge">

                                Code:
                                <strong th:text="${tradingCode}"></strong>

                            </span>

                            <span th:if="${fromDate != null}" class="filter-badge">

                                From:
                                <strong th:text="${fromDate}"></strong>

                            </span>

                            <span th:if="${toDate != null}" class="filter-badge">

                                To:
                                <strong th:text="${toDate}"></strong>

                            </span>

                        </div>

                    </div>

                    <div class="panel-body table-wrap">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>DATE</th>
                                    <th>TRADING CODE</th>
                                    <th>LTP*</th>
                                    <th>HIGH</th>
                                    <th>LOW</th>
                                    <th>OPENP*</th>
                                    <th>CLOSEP*</th>
                                    <th>YCP</th>
                                    <th>TRADE</th>
                                    <th>VALUE (mn)</th>
                                    <th>VOLUME</th>
                                    <th>ACTION</th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr th:each="stock : ${stocks}">
                                    <td th:text="${stock.date}"></td>

                                    <td class="fw-bold" th:text="${stock.tradingCode}">
                                    </td>

                                    <td th:text="${stock.ltp}"></td>

                                    <td th:text="${stock.high}"></td>

                                    <td th:text="${stock.low}"></td>

                                    <td th:text="${stock.openp}"></td>

                                    <td th:text="${stock.closep}"></td>

                                    <td th:text="${stock.ycp}"></td>

                                    <td th:text="${#numbers.formatInteger(stock.trade, 0, 'COMMA')}"></td>

                                    <td th:text="${stock.tradeValue}"></td>

                                    <td th:text="${#numbers.formatInteger(stock.volume, 0, 'COMMA')}"></td>

                                    <td>
                                        <a class="button button-small" th:href="@{/stocks/{id}/edit(id=${stock.id})}">
                                            <i class="fa-solid fa-pen-to-square"></i>
                                            Edit
                                        </a>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(stocks)}">
                                    <td colspan="12" style="text-align: center; padding: 2rem;">
                                        No stock data records found.
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:replace="~{fragments/pagination :: pagination(${stockPage}, '/stocks/data')}"></div>
                </section>
            </main>
        </div>
    </div>

    <div th:replace="~{fragments/script-addon :: script-addon()}"></div>
</body>

</html>
